<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NJ Energy Explorer</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <span>Loading map data&hellip;</span>
    </div>
  </div>

  <div class="app-shell">
    <aside class="panel">
      <div class="panel-header">
        <div class="brand-mark"></div>
        <div>
          <h1>NJ Energy Explorer</h1>
          <p class="subtle">Day-Ahead LMP by ZIP Code</p>
        </div>
      </div>

      <div class="section-divider"></div>

      <label for="zipSearch">Jump to ZIP code</label>
      <div class="search-row">
        <input id="zipSearch" type="text" maxlength="5" placeholder="e.g. 07030" />
        <button id="searchBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <label for="yearSelect">Year</label>
      <select id="yearSelect" class="year-select"></select>

      <div class="month-slider-section">
        <div class="month-slider-header">
          <label for="monthSlider">Month</label>
          <span id="monthLabel" class="month-label-value">January</span>
        </div>
        <input type="range" id="monthSlider" min="1" max="12" value="1" step="1" />
        <div class="month-ticks">
          <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span>
          <span>May</span><span>Jun</span><span>Jul</span><span>Aug</span>
          <span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
        </div>
      </div>

      <div class="heatmap-row">
        <label class="toggle-label">
          <input type="checkbox" id="heatmapToggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Heatmap (LMP by ZIP)
        </label>
      </div>

      <div class="section-divider"></div>

      <div id="info" class="info-card">
        <div class="info-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.2" opacity="0.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <p>Click a ZIP on the map to explore LMP data.</p>
        </div>
      </div>

      <p class="footnote">
        Data: PJM Interconnection &middot; Map: OpenStreetMap &middot; Boundaries: OpenDataDE
      </p>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
